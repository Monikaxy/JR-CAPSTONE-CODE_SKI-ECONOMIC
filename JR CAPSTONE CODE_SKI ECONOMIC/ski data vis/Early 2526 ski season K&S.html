<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Early Season Snowfall Comparison (Nov–Dec 2025)</title>
  <script src="https://cdn.plot.ly/plotly-2.35.2.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #ffffff;
    }

    #chart {
      width: 1100px;
      height: 520px;
      max-width: 100%;
    }
  </style>
</head>
<body>
  <div id="chart"></div>

  <script>
    const trace1 = {
      x: ["Nov 2025", "Dec 2025"],
      y: [0.05, 0.60],
      name: "Steamboat (CO)",
      type: "bar",
      marker: { color: "#1f4e79" },
      text: ["0.05", "0.60"],
      textposition: "outside",
      hovertemplate: "%{x}<br>%{fullData.name}: %{y:.2f}<extra></extra>"
    };

    const trace2 = {
      x: ["Nov 2025", "Dec 2025"],
      y: [0.50, 2.50],
      name: "Killington (VT)",
      type: "bar",
      marker: { color: "#2e8b57" },
      text: ["0.50", "2.50"],
      textposition: "outside",
      hovertemplate: "%{x}<br>%{fullData.name}: %{y:.2f}<extra></extra>"
    };

    const layout = {
      barmode: "group",
      width: 1100,
      height: 520,
      margin: { l: 70, r: 30, t: 85, b: 65 },
      plot_bgcolor: "white",
      paper_bgcolor: "white",
      title: {
        text: "Early Season Snowfall Comparison (Nov–Dec 2025)<br>Steamboat (CO) vs Killington (VT)",
        x: 0.5,
        xanchor: "center",
        font: { size: 18, color: "#222" }
      },
      xaxis: {
        tickfont: { size: 14, color: "#333" },
        showgrid: false,
        zeroline: false
      },
      yaxis: {
        title: {
          text: "Snowfall Index (Relative to Historical Average = 1.0)",
          font: { size: 14, color: "#333" }
        },
        range: [0, 3.0],
        dtick: 0.5,
        showgrid: true,
        gridcolor: "rgba(0,0,0,0.08)",
        zeroline: false,
        tickfont: { size: 12, color: "#333" }
      },
      legend: {
        orientation: "h",
        x: 0.5,
        xanchor: "center",
        y: 1.06,
        yanchor: "top",
        font: { size: 12, color: "#333" }
      },
      shapes: [
        {
          type: "line",
          xref: "paper",
          x0: 0,
          x1: 1,
          yref: "y",
          y0: 1,
          y1: 1,
          line: {
            color: "gray",
            width: 2,
            dash: "dash"
          }
        }
      ]
    };

    const config = {
      responsive: true,
      displayModeBar: true,
      scrollZoom: true
    };

    Plotly.newPlot("chart", [trace1, trace2], layout, config);
  </script>
</body>
</html>
